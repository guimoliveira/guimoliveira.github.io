<html>
	<head>
		<title>Despertador</title>
		
		<style>
	
			.title {
				width: 100px;
				height: 25px;
				text-align: center;
				margin-bottom: 5px;
				font-family: arial;
				font-size: 14px;
			}

			.timer {
				width: 76px;
				height: 25px;
				margin-bottom: 5px;
				padding: 2px;
				border: 1px solid grey;
				font-family: arial;
				font-size: 12px;
			}
			
			.delete {
				width: 25px;
				height: 25px;
				margin-left: -1px;
				margin-bottom: 5px;
				padding: 2px;
				border: 1px solid grey;
				font-family: arial;
				font-size: 12px;
				background: #ececec;
			}

			.add {
				width: 100px;
				height: 25px;
				padding: 2px;
				border: 1px solid grey;
				font-family: arial;
				font-size: 12px;
				background: #ececec;
			}

			.delete:hover, .add:hover {
				background: #fafafa;
			}

			.delete:active, .add:active {
				border: 1px solid lightgrey;
			}

			#timers {
				margin-bottom: 5px;
			}

		</style>

	</head>

	<body>
		<div class="title">Despertador</div>
		<div id="timers">
			
		</div>

		<input type="button" value="Adicionar" class="add" onclick="add();">

		<script>
			
			var timersDiv = document.getElementById("timers");
			var i = 0;

			function add() {
				var br = document.createElement("br");

				var input = document.createElement("input");
				input.type = "time";
				input.className = "timer";
				input.id = "timer"+i;

				var del = document.createElement("input");
				del.type = "button";
				del.className = "delete";
				del.value = "X";
				del.id = "delete"+i;
				del.onclick = function(){
					timersDiv.removeChild(input);
					timersDiv.removeChild(del);
					timersDiv.removeChild(br);
				};

				timersDiv.appendChild(input);
				timersDiv.appendChild(del);
				timersDiv.appendChild(br);

				i++;

				if (window.Notification && Notification.permission !== "granted") {
    				Notification.requestPermission(function (status) {
      				if (Notification.permission !== status) {
      					Notification.permission = status;
      				}
    				});
  			}

			}

			function verify() {
				var timers = timersDiv.getElementsByClassName("timer");

				var today = new Date();
				
				for (var j = 0; j < timers.length; j++) {
					let timer = timers[j];
					let time = timer.value;
					
					let date = new Date(today.toDateString() + ' ' + time);

					let dif = Math.abs(date - today);

					if (dif <= 30000) {
						if (window.Notification && Notification.permission === "granted") {
							var t;
							function createNot() {
								var not = new Notification("Despertador: " + time);	
								t = setTimeout(createNot, 500);
								not.onclick = function(){clearTimeout(t);}
							}
							createNot();
						} else {
							alert("Despertador: " + time);
						}
					}
				}

			}

			setInterval(verify, 60000);

		</script>

	</body>

</html>
